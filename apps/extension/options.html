<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Flowy — Settings</title>
    <link rel="stylesheet" href="options.css" />
  </head>
  <body>
    <main class="container">
      <header class="hdr">
        <img src="icons/icon-128.png" alt="" width="40" height="40" />
        <div>
          <h1>Flowy</h1>
          <p class="muted">Save any page to your Flowy inbox.</p>
        </div>
      </header>

      <section class="card">
        <h2>Server</h2>
        <label>
          <span>Flowy web URL</span>
          <input id="flowy-url" type="url" placeholder="https://tryflowy.app" />
        </label>
        <label>
          <span>PocketBase URL <small class="muted">(usually same as above)</small></span>
          <input id="pb-url" type="url" placeholder="https://tryflowy.app" />
        </label>
        <div class="row">
          <button id="save-server" class="btn">Save server settings</button>
          <span id="server-status" class="status" aria-live="polite"></span>
        </div>
      </section>

      <section class="card" id="signin-card">
        <h2>Sign in</h2>
        <p class="muted">Use your Flowy email and password.</p>
        <label>
          <span>Email</span>
          <input id="email" type="email" autocomplete="email" />
        </label>
        <label>
          <span>Password</span>
          <input id="password" type="password" autocomplete="current-password" />
        </label>
        <div class="row">
          <button id="signin-btn" class="btn btn-primary">Sign in</button>
          <span id="signin-status" class="status" aria-live="polite"></span>
        </div>
      </section>

      <section class="card" id="signed-in-card" hidden>
        <h2>Account</h2>
        <p>Signed in as <strong id="current-email"></strong>.</p>
        <div class="row">
          <button id="signout-btn" class="btn">Sign out</button>
        </div>
      </section>

      <section class="card">
        <h2>Shortcuts</h2>
        <p class="muted">
          Quick save the current tab with <kbd>Ctrl/Cmd + Shift + S</kbd>.
          Change the shortcut at <a href="#" id="open-shortcuts">chrome://extensions/shortcuts</a>.
        </p>
      </section>
    </main>

    <script type="module" src="options.js"></script>
  </body>
</html>
